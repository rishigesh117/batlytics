name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer
        run: |
          pip install buildozer cython==0.29.33 virtualenv

      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev automake lld

      - name: Build APK (Smart Search)
        run: |
          # Find the folder containing buildozer.spec and go there
          SPEC_DIR=$(dirname $(find . -name buildozer.spec | head -n 1))
          echo "Found buildozer.spec in: $SPEC_DIR"
          cd "$SPEC_DIR"
          export BUILDOZER_WARN_ON_ROOT=0
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: batlytics-apk
          path: '**/*.apk'
