name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer
        run: |
          pip install buildozer cython==0.29.33 virtualenv

      - name: Install OS dependencies (Fixed for Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev automake lld
          
      - name: Unzip everything automatically
        run: |
          find . -name "*.zip" -exec unzip -o -q {} \; || true
          
      - name: Fix Reportlab & Build APK
        run: |
          # 1. Find the code folder
          SPEC_DIR=$(dirname $(find . -name buildozer.spec | head -n 1))
          echo "Found code in: $SPEC_DIR"
          cd "$SPEC_DIR"
          
          # 2. Fix the ReportLab Bug
          echo "Fixing Reportlab..."
          sed -i 's/,reportlab//g' buildozer.spec
          sed -i 's/reportlab,//g' buildozer.spec
          pip install reportlab pillow --target .
          find . -name "*.so" -type f -delete
          
          # 3. Build it!
          export BUILDOZER_WARN_ON_ROOT=0
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: batlytics-apk
          path: '**/*.apk'
